    <div class="row gy-5 carrer-forms">
      <div class="col-lg-12">
        <div class="pt-1 bg-black">
          <div class="p-4 p-lg-4 bg-white ">
            <form action="#">
              <div class="row gy-3">
                <div class="col-lg-6 form-outline">
                  <input class="form-control " type="text" name="firstname" id="validationDefault01" placeholder="First name" required/>
                  
                </div>
                <div class="col-lg-6">
                  <input class="form-control" type="text" name="lastname"  placeholder="Last name" required/>
                </div>
                <div class="col-lg-6">
                  <input class="form-control" type="tel" name="phone" placeholder="Phone number" required/>
                </div>
                
                  <div class="custom-file  col-lg-6 " id="file-input">

                    <input type="file" class="custom-file-input form-contro" id="validatedCustomFile" style="display:none;" required/>
                    <label class="custom-file-label file-up" for="validatedCustomFile"> <button class="btn  btn-outline-none text-center">click here to upload your resume</button>
                    </label>

                  </div>
                
                <div class="col-lg-12">
                  <input class="form-control" type="email" name="email" placeholder="Email address" required/>
                </div>


                <div class="form-group col-lg-12">
                  <select class="form-control" id="exampleFormControlSelect4" required>
                    <option selected>select the role</option>
                    <option>designer</option>
                    <option>technician</option>
                    <option>4</option>
                    <option>5</option>
                  </select>
                </div>


                <div class="col-lg-12">
                  <textarea class="form-control" name="message" rows="5" placeholder="Leave your message" required></textarea>
                </div>
                <div class="col-lg-12">
                  <button class="btn btn-outline-dark" type="submit">Submit now</button>
                </div>
              </div>
            </form>
          </div>
